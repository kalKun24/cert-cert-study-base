          description: 議論点メモ（Markdown形式）
          example: "## メモ\n- 可用性の定義について議論"
        tags:
          type: array
          items:
            type: string
          description: タグ（フラット・複数付与可）
          example: ["CISSP", "ドメイン1"]
        status:
          type: string
          enum:
            - draft
