    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: ログインID
          example: "alice"
        password:
          type: string
          description: パスワード（平文）
          minLength: 8
          example: "password123"

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
              description: JWTアクセストークン
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            user:
              $ref: "#/components/schemas/User"
        error:
          type: string
          nullable: true

    CreateUserRequest:
      type: object
      required:
        - username
        - display_name
        - email
        - password
        - role
      properties:
        username:
          type: string
          description: ログインID（一意）
          example: "alice"
        display_name:
          type: string
          description: UI表示名
          example: "Alice Smith"
        email:
          type: string
          format: email
          description: メールアドレス（一意）
          example: "alice@example.com"
        password:
          type: string
          description: パスワード（平文。サーバー側でbcryptハッシュ化）
          minLength: 8
          example: "password123"
        role:
          type: string
          enum:
            - admin
            - teamowner
            - user
          description: ロール
          example: "user"

    UpdateUserRequest:
      type: object
      properties:
        display_name:
          type: string
          description: UI表示名
          example: "Alice Smith"
        email:
          type: string
          format: email
          description: メールアドレス（一意）
          example: "alice@example.com"
        role:
          type: string
          enum:
            - admin
            - teamowner
            - user
          description: ロール
          example: "user"
        password:
          type: string
          description: 新しいパスワード（省略時は変更しない）
          minLength: 8
          example: "newpassword123"

    UpdateUserStatusRequest:
      type: object
      required:
        - is_active
      properties:
        is_active:
          type: boolean
          description: 有効化する場合は true、停止する場合は false
          example: false

    ErrorResponse:
      type: object
      properties:
        data:
          nullable: true
        error:
          type: string
          description: エラーメッセージ
          example: "認証に失敗しました"

  responses:
    BadRequest:
      description: リクエストが不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: 認証が必要、またはトークンが無効
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: 権限がない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: リソースが競合（username・email の重複など）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
