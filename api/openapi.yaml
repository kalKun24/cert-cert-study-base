        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      summary: ノート一覧取得（チームメンバーのみ）
      description: |
        指定チームのノート一覧を返します。
        チームメンバーのみ取得可能です。
        - キーワード検索: title / body / discussion_points / memo を対象に部分一致検索
        - タグ絞り込み: tag_ids をカンマ区切りで指定（AND絞り込み）
        - 可視性ルール: draft は作成者本人または admin のみ返す
      operationId: listNotes
      tags:
        - notes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TeamID"
        - name: keyword
          in: query
          required: false
          description: タイトル・本文・議論点・メモを対象としたキーワード検索（部分一致）
          schema:
            type: string
            example: "暗号化"
        - name: tag_ids
          in: query
          required: false
          description: カンマ区切りのタグID（AND絞り込み）
          schema:
            type: string
            example: "tag-1,tag-2"
        - name: page
          in: query
          required: false
          description: 取得するページ番号（1始まり。省略時は1）
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: 1ページあたりの件数（省略時は20、最大100）
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        "200":
          description: ノート一覧（ページネーション情報付き）
          content:
            application/json:
              schema:
                type: object
                properties:
