openapi: 3.0.0
info:
  title: cert-study-base API
  description: セキュリティ資格勉強会管理システムのREST API
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/v1
    description: ローカル開発環境

paths:
  /health:
    get:
      summary: ヘルスチェック
      operationId: getHealth
      tags:
        - system
      responses:
        "200":
          description: 正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                  error:
                    type: string
                    nullable: true
