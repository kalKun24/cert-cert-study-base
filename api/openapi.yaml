            $ref: "#/components/schemas/Question"
          description: 問題の一覧
        total:
          type: integer
          description: フィルタリング後の総件数
          example: 100
        page:
          type: integer
          description: 現在のページ番号（1始まり）
          example: 2
        per_page:
          type: integer
          description: 1ページあたりの件数
          example: 20
        total_pages:
          type: integer
          description: 総ページ数
          example: 5

    CreateQuestionRequest:
