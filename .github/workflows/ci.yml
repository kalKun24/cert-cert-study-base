name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  secret-scan:
    name: シークレット検出（gitleaks）
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks でシークレットを検出
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-backend:
    name: バックエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: gcloud をセットアップ（Firestore エミュレータ込み）
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'cloud-firestore-emulator'

      - name: Java 21 をセットアップ（Firestoreエミュレータの実行に必要）
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Firestore エミュレータを起動
        run: |
          gcloud emulators firestore start --host-port=127.0.0.1:8080 &
          # ポートが開くまで最大30秒待機
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 8080 2>/dev/null; then
              echo "Firestore エミュレータが起動しました（${i}秒）"
              break
            fi
            sleep 1
          done

      - name: テストを実行
        working-directory: backend
        run: go test ./... -v
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          GCP_PROJECT_ID: test-project

  lint-backend:
    name: バックエンドLint
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: golangci-lint を実行
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

  security-scan:
    name: セキュリティスキャン（Trivy + gosec）
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: gosec で Go ソースコードの SAST スキャンを実行
        working-directory: backend
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sarif -out gosec-results.sarif ./... || true

      - name: gosec の SARIF 結果を GitHub Security タブにアップロード
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/gosec-results.sarif
          category: gosec

      - name: Trivy で Go の依存関係脆弱性スキャンを実行
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: backend
          scanners: vuln
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      - name: Trivy の SARIF 結果を GitHub Security タブにアップロード
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  test-frontend:
    name: フロントエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係をインストール
        working-directory: frontend
        run: npm ci

      - name: テストを実行
        working-directory: frontend
        run: npm test
