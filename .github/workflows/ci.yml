name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    name: バックエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: テストを実行
        working-directory: backend
        run: go test ./... -v

  lint-backend:
    name: バックエンドLint
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: golangci-lint を実行
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: backend
