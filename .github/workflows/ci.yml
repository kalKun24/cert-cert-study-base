name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    name: バックエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: gcloud をセットアップ（Firestore エミュレータ込み）
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'cloud-firestore-emulator'

      - name: Firestore エミュレータを起動
        run: |
          gcloud emulators firestore start --host-port=localhost:8080 --project=test-project &
          sleep 5

      - name: テストを実行
        working-directory: backend
        run: go test ./... -v
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          GCP_PROJECT_ID: test-project

  lint-backend:
    name: バックエンドLint
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: golangci-lint を実行
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

  test-frontend:
    name: フロントエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係をインストール
        working-directory: frontend
        run: npm ci

      - name: テストを実行
        working-directory: frontend
        run: npm test
