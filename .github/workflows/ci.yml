name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    name: バックエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: fake-gcs-server を起動
        run: |
          docker run -d --name fake-gcs \
            -p 4443:4443 \
            fsouza/fake-gcs-server:latest \
            -scheme http -port 4443 -backend memory
          timeout 15 sh -c 'until curl -sf http://localhost:4443/storage/v1/b; do sleep 1; done'

      - name: テストを実行（統合テスト含む）
        working-directory: backend
        env:
          GCS_EMULATOR_HOST: http://localhost:4443
          GCS_BUCKET: test-bucket
        run: go test ./... -v

  lint-backend:
    name: バックエンドLint
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: golangci-lint を実行
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend
