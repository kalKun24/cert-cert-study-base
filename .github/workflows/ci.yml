name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    name: バックエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: gcloud をセットアップ（Firestore エミュレータ込み）
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'cloud-firestore-emulator'

      - name: Java 21 をセットアップ（Firestoreエミュレータの実行に必要）
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Firestore エミュレータを起動
        run: |
          gcloud emulators firestore start --host-port=127.0.0.1:8080 &
          # ポートが開くまで最大30秒待機
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 8080 2>/dev/null; then
              echo "Firestore エミュレータが起動しました（${i}秒）"
              break
            fi
            sleep 1
          done

      - name: テストを実行
        working-directory: backend
        run: go test ./... -v
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          GCP_PROJECT_ID: test-project

  lint-backend:
    name: バックエンドLint
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Go をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: golangci-lint を実行
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

  test-frontend:
    name: フロントエンドテスト
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係をインストール
        working-directory: frontend
        run: npm ci

      - name: テストを実行
        working-directory: frontend
        run: npm test
